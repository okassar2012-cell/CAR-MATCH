// ==================== QUIZ ====================
const getQuizQuestions = () => [
  { q: t('q1'), options: [
    { text: t('q1o1'), emoji: "💰", value: "low" },
    { text: t('q1o2'), emoji: "💵", value: "mid" },
    { text: t('q1o3'), emoji: "💎", value: "high" },
    { text: t('q1o4'), emoji: "👑", value: "ultra" },
  ]},
  { q: t('q2'), options: [
    { text: t('filterEconomy'), emoji: "🚗", value: "اقتصادية" },
    { text: t('filterSedan'), emoji: "🚙", value: "سيدان" },
    { text: "SUV", emoji: "🚙", value: "SUV" },
    { text: t('filterSports'), emoji: "🏎️", value: "رياضية" },
    { text: t('filterLuxury'), emoji: "✨", value: "فاخرة" },
    { text: t('filterFamily'), emoji: "👨‍👩‍👧‍👦", value: "عائلية" },
    { text: t('filterPickup'), emoji: "🛻", value: "بيك أب" },
  ]},
  { q: t('q3'), options: [
    { text: t('q3o1'), emoji: "🏙️", value: "مدينة" },
    { text: t('q3o2'), emoji: "🛣️", value: "سفر" },
    { text: t('q3o3'), emoji: "🔄", value: "both" },
  ]},
  { q: t('q4'), options: [
    { text: t('q4o1'), emoji: "⛽", value: "بنزين" },
    { text: t('q4o2'), emoji: "🛢️", value: "ديزل" },
    { text: t('q4o3'), emoji: "⚡", value: "كهربائية" },
    { text: t('q4o4'), emoji: "🔋", value: "هجين" },
    { text: t('q4o5'), emoji: "🤷", value: "any" },
  ]},
];

let quizStep = 0;
let quizAnswers = {};
let currentFilter = 'all';
let currentPrice = 'all';
let allData = [];

// ==================== DARK MODE ====================
function toggleDark() {
  document.documentElement.classList.toggle('dark');
  localStorage.setItem('dark', document.documentElement.classList.contains('dark'));
  lucide.createIcons();
}
if (localStorage.getItem('dark') === 'true') document.documentElement.classList.add('dark');

// ==================== SCROLL ====================
function scrollToSection(id) {
  document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
}

// ==================== QUIZ RENDER ====================
function renderQuiz() {
  const container = document.getElementById('quiz-container');
  const result = document.getElementById('quiz-result');
  result.classList.add('hidden');
  
  const questions = getQuizQuestions();
  
  if (quizStep >= questions.length) {
    container.innerHTML = '';
    showQuizResult();
    return;
  }
  
  const q = questions[quizStep];
  const progress = ((quizStep) / questions.length) * 100;
  
  container.innerHTML = `
    <div class="fade-in">
      <div class="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-2 mb-6">
        <div class="bg-yellow-500 h-2 rounded-full transition-all duration-500" style="width:${progress}%"></div>
      </div>
      <p class="text-sm text-slate-400 mb-2">${currentLang === 'ar' ? `سؤال ${quizStep + 1} من ${questions.length}` : `Question ${quizStep + 1} of ${questions.length}`}</p>
      <h3 class="text-2xl font-bold mb-6">${q.q}</h3>
      <div class="grid grid-cols-2 sm:grid-cols-${q.options.length > 4 ? '3' : '2'} gap-3">
        ${q.options.map((o, i) => `
          <button onclick="answerQuiz(${quizStep}, '${o.value}')" class="quiz-option p-4 rounded-2xl bg-white dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 hover:border-yellow-500 text-center">
            <span class="text-3xl block mb-2">${o.emoji}</span>
            <span class="font-medium text-sm">${o.text}</span>
          </button>
        `).join('')}
      </div>
      ${quizStep > 0 ? `<button onclick="quizStep--;renderQuiz()" class="mt-4 text-sm text-slate-400 hover:text-yellow-500 transition">${t('back')}</button>` : ''}
    </div>
  `;
}

function answerQuiz(step, value) {
  quizAnswers[step] = value;
  quizStep++;
  renderQuiz();
}

function showQuizResult() {
  const budget = quizAnswers[0];
  const type = quizAnswers[1];
  const use = quizAnswers[2];
  const fuel = quizAnswers[3];

  let filtered = CARS.filter(c => {
    let match = true;
    if (budget === 'low' && c.price > 22000) match = false;
    if (budget === 'mid' && (c.price < 20000 || c.price > 55000)) match = false;
    if (budget === 'high' && (c.price < 50000 || c.price > 100000)) match = false;
    if (budget === 'ultra' && c.price < 90000) match = false;
    if (c.type !== type && type !== 'عائلية') match = false;
    if (type === 'عائلية' && c.seats < 7) match = false;
    if (use !== 'both' && c.use !== use) match = false;
    if (fuel !== 'any' && c.fuel !== fuel) match = false;
    return match;
  });

  if (filtered.length === 0) {
    filtered = CARS.filter(c => {
      if (budget === 'low') return c.price <= 25000;
      if (budget === 'mid') return c.price >= 20000 && c.price <= 55000;
      if (budget === 'high') return c.price >= 45000 && c.price <= 100000;
      if (budget === 'ultra') return c.price >= 80000;
      return true;
    }).filter(c => c.type === type || type === 'عائلية' && c.seats >= 7);
  }
  if (filtered.length === 0) {
    filtered = CARS.filter(c => {
      if (budget === 'low') return c.price <= 30000;
      if (budget === 'mid') return c.price <= 60000;
      if (budget === 'high') return c.price <= 110000;
      return true;
    }).slice(0, 3);
  }

  const top = filtered.slice(0, 3);
  const resultDiv = document.getElementById('quiz-result');
  resultDiv.classList.remove('hidden');
  
  resultDiv.innerHTML = `
    <div class="fade-in">
      <div class="text-center mb-8">
        <span class="text-6xl block mb-4">🎉</span>
        <h3 class="text-2xl font-bold mb-2">${currentLang === 'ar' ? 'نتيجتك جاهزة!' : 'Your Result is Ready!'}</h3>
        <p class="text-slate-400">${currentLang === 'ar' ? 'بناءً على إجاباتك، هذه أفضل السيارات الك:' : 'Based on your answers, here are the best cars for you:'}</p>
      </div>
      <div class="space-y-4">
        ${top.map((c, i) => `
          <div class="bg-white dark:bg-slate-800 rounded-2xl p-5 border-2 ${i === 0 ? 'border-yellow-500 glow' : 'border-slate-200 dark:border-slate-700'} cursor-pointer hover:border-yellow-500 transition" onclick="openModal('${c.id}')">
            <div class="flex items-center gap-4">
              <span class="text-4xl">${c.emoji}</span>
              <div class="flex-1">
                <div class="flex items-center gap-2">
                  ${i === 0 ? `<span class="text-xs bg-yellow-500 text-slate-900 px-2 py-0.5 rounded-full font-bold">${t('bestForYou')}</span>` : ''}
                </div>
                <h4 class="font-bold text-lg">${c.brand} ${c.name}</h4>
                <p class="text-sm text-slate-400">${c.type} • ${c.hp} ${currentLang === 'ar' ? 'حصان' : 'HP'} • ${c.fuel}</p>
              </div>
              <div class="text-left">
                <p class="font-heading font-bold text-yellow-500 text-lg">$${c.price.toLocaleString()}</p>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
      <button onclick="quizStep=0;quizAnswers={};renderQuiz()" class="w-full mt-6 py-3 bg-slate-100 dark:bg-slate-800 rounded-xl font-medium hover:bg-slate-200 dark:hover:bg-slate-700 transition">${t('retakeQuiz')}</button>
    </div>
  `;
}

// ==================== CARS GRID ====================
function renderCars() {
  const grid = document.getElementById('cars-grid');
  const noMsg = document.getElementById('no-cars');
  const search = document.getElementById('search-input').value.toLowerCase();
  
  let filtered = CARS.filter(c => {
    if (currentFilter !== 'all' && c.type !== currentFilter) return false;
    if (currentPrice === 'low' && c.price >= 25000) return false;
    if (currentPrice === 'mid' && (c.price < 25000 || c.price > 60000)) return false;
    if (currentPrice === 'high' && c.price <= 60000) return false;
    if (search && !c.brand.toLowerCase().includes(search) && !c.name.toLowerCase().includes(search)) return false;
    return true;
  });

  if (filtered.length === 0) {
    grid.innerHTML = '';
    noMsg.classList.remove('hidden');
    return;
  }
  noMsg.classList.add('hidden');

  const ratingMap = {};
  allData.filter(d => d.type === 'rating').forEach(d => {
    if (!ratingMap[d.car_id]) ratingMap[d.car_id] = [];
    ratingMap[d.car_id].push(d.rating);
  });

  grid.innerHTML = filtered.map(c => {
    const ratings = ratingMap[c.id] || [];
    const avg = ratings.length ? (ratings.reduce((a, b) => a + b, 0) / ratings.length).toFixed(1) : null;
    return `
    <div class="car-card bg-white dark:bg-slate-900 rounded-2xl overflow-hidden border border-slate-200 dark:border-slate-800">
      <div class="relative h-36 flex items-center justify-center text-6xl" style="background:linear-gradient(135deg, ${c.color}22, ${c.color}44)">
        ${c.emoji}
      </div>
      <div class="p-4 cursor-pointer" onclick="openModal('${c.id}')">
        <div class="flex items-center justify-between mb-1">
          <span class="text-xs font-medium px-2 py-0.5 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-500">${c.type}</span>
          ${avg ? `<span class="text-xs text-yellow-500 font-bold">⭐ ${avg}</span>` : ''}
        </div>
        <h3 class="font-bold text-lg">${c.brand} ${c.name}</h3>
        <p class="text-xs text-slate-400 mb-3">${c.year} • ${c.hp} ${currentLang === 'ar' ? 'حصان' : 'HP'} • ${c.fuel}</p>
        <div class="flex items-center justify-between">
          <span class="font-heading font-bold text-yellow-500">$${c.price.toLocaleString()}</span>
          <span class="text-xs text-slate-400">${c.seats} ${currentLang === 'ar' ? 'مقاعد' : 'seats'}</span>
        </div>
      </div>
    </div>
  `}).join('');
}

function filterCars(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('bg-yellow-500', b.dataset.filter === f);
    b.classList.toggle('text-slate-900', b.dataset.filter === f);
    b.classList.toggle('bg-slate-100', b.dataset.filter !== f);
    b.classList.toggle('dark:bg-slate-800', b.dataset.filter !== f);
  });
  renderCars();
}

function filterPrice(p) {
  currentPrice = p;
  document.querySelectorAll('.price-btn').forEach(b => {
    b.classList.toggle('bg-yellow-500', b.dataset.price === p);
    b.classList.toggle('text-slate-900', b.dataset.price === p);
    b.classList.toggle('bg-slate-100', b.dataset.price !== p);
    b.classList.toggle('dark:bg-slate-800', b.dataset.price !== p);
  });
  renderCars();
}

// ==================== MODAL ====================
function openModal(id) {
  const car = CARS.find(c => c.id === id);
  if (!car) return;
  
  const ratings = allData.filter(d => d.type === 'rating' && d.car_id === id);
  const avg = ratings.length ? (ratings.reduce((a, b) => a + b.rating, 0) / ratings.length).toFixed(1) : t('noMatch');
  
  const mc = document.getElementById('modal-content');
  mc.innerHTML = `
    <div class="text-center pt-4">
      <div class="w-24 h-24 rounded-full mx-auto flex items-center justify-center text-5xl mb-4" style="background:linear-gradient(135deg, ${car.color}33, ${car.color}66)">
        ${car.emoji}
      </div>
      <h3 class="font-heading font-bold text-2xl mb-1">${car.brand} ${car.name}</h3>
      <p class="text-slate-400 mb-4">${car.year} • ${car.type}</p>
      <div class="grid grid-cols-3 gap-3 mb-6">
        <div class="bg-slate-50 dark:bg-slate-800 rounded-xl p-3 text-center">
          <p class="text-xs text-slate-400">${t('price')}</p>

async function rateCarModal(carId, rating) {
  const msg = document.getElementById('modal-rate-msg');
  if (allData.length >= 999) {
    msg.textContent = '⚠️ ' + (currentLang === 'ar' ? 'تم الوصول للحد الأقصى' : 'Limit reached');
    msg.className = 'text-sm text-red-500';
    return;
  }
  const stars = document.querySelectorAll('#modal-stars button');
  stars.forEach((s, i) => {
    s.style.color = i < rating ? '#eab308' : '';
  });
  stars.forEach(s => s.disabled = true);
  msg.textContent = currentLang === 'ar' ? 'جاري الحفظ...' : 'Saving...';
  msg.className = 'text-sm text-slate-400';
  
  const result = await window.dataSdk.create({
    type: 'rating',
    car_id: carId,
    rating: rating,
    comment: '',
    username: '',
    created_at: new Date().toISOString()
  });
  
  if (result.isOk) {
    msg.textContent = t('thanks') + ' ' + '⭐'.repeat(rating);
    msg.className = 'text-sm text-yellow-500 font-medium';
  } else {
    msg.textContent = t('error');
    msg.className = 'text-sm text-red-500';
    stars.forEach(s => s.disabled = false);
  }
}

let modalRating = 0;

function setModalRating(rating) {

  const stars = document.querySelectorAll('#modal-stars button');

  });
}

async function submitCarComment(carId) {
  const name = document.getElementById('modal-comment-name').value.trim();
  const text = document.getElementById('modal-comment-text').value.trim();
  const msg = document.getElementById('modal-comment-msg');
  
  if (!name || !text) {
    msg.textContent = currentLang === 'ar' ? 'الرجاء إدخال الاسم والتعليق' : 'Please fill in name and comment';
    msg.className = 'text-xs text-red-500 bg-red-50 dark:bg-red-900/20 px-2 py-1 rounded';
    msg.classList.remove('hidden');
    return;
  }
  if (modalRating === 0) {
    msg.textContent = currentLang === 'ar' ? 'الرجاء اختيار تقييم' : 'Please select a rating';
    msg.className = 'text-xs text-red-500 bg-red-50 dark:bg-red-900/20 px-2 py-1 rounded';
    msg.classList.remove('hidden');
    return;
  }
  if (allData.length >= 999) {
    msg.textContent = currentLang === 'ar' ? 'تم الوصول للحد الأقصى' : 'Limit reached';
    msg.className = 'text-xs text-red-500 bg-red-50 dark:bg-red-900/20 px-2 py-1 rounded';
    msg.classList.remove('hidden');
    return;
  }

  msg.textContent = currentLang === 'ar' ? 'جاري الإرسال...' : 'Sending...';
  msg.className = 'text-xs text-slate-400 px-2 py-1 rounded';
  msg.classList.remove('hidden');
  
  const result = await window.dataSdk.create({
    type: 'car_comment',
    car_id: carId,
    rating: modalRating,
    comment: text,
    username: name,
    created_at: new Date().toISOString()
  });

  if (result.isOk) {
    msg.textContent = currentLang === 'ar' ? '✅ تم الإرسال!' : '✅ Sent!';
    msg.className = 'text-xs text-green-600 bg-green-50 dark:bg-green-900/20 px-2 py-1 rounded';
    document.getElementById('modal-comment-name').value = '';
    document.getElementById('modal-comment-text').value = '';
    modalRating = 0;
    document.querySelectorAll('#modal-stars button').forEach(s => s.style.color = '');
  } else {
    msg.textContent = t('error');
    msg.className = 'text-xs text-red-500 bg-red-50 dark:bg-red-900/20 px-2 py-1 rounded';
  }
}

function loadCarComments(carId) {
  const list = document.getElementById('modal-comments-list');
  const comments = allData.filter(d => d.type === 'car_comment' && d.car_id === carId).sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  
  if (comments.length === 0) {
    list.innerHTML = `<p class="text-center text-xs text-slate-400 py-4">${currentLang === 'ar' ? 'لا توجد تعليقات بعد' : 'No comments yet'}</p>`;
    return;
  }
  
  list.innerHTML = comments.map(c => `
    <div class="bg-white dark:bg-slate-700 rounded-lg p-3 text-sm border border-slate-200 dark:border-slate-600">
      <div class="flex items-center justify-between mb-1">
        <span class="font-bold text-xs">${c.username}</span>
        <span class="text-yellow-500 text-xs">${'⭐'.repeat(c.rating || 0)}</span>

      <p class="text-xs text-slate-400 mt-1">${new Date(c.created_at).toLocaleDateString(currentLang)}</p>

}

  const btn = document.getElementById('submit-comment-btn');

function renderComments() {
  const list = document.getElementById('comments-list');
  const comments = allData.filter(d => d.type === 'comment').sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  
  if (comments.length === 0) {
    list.innerHTML = `<p class="text-center text-slate-400 py-12 text-lg">${currentLang === 'ar' ? 'لا توجد تعليقات بعد' : 'No comments yet'}</p>`;
    return;
  }
  
  const existingIds = new Map([...list.children].filter(el => el.dataset.id).map(el => [el.dataset.id, el]));
  const currentIds = new Set(comments.map(c => c.__backendId));
  
  existingIds.forEach((el, id) => { if (!currentIds.has(id)) el.remove(); });
  
  comments.forEach((c, i) => {
    const id = c.__backendId;
    if (existingIds.has(id)) return;
    const div = document.createElement('div');
    div.dataset.id = id;
    div.className = 'bg-white dark:bg-slate-900 rounded-2xl p-5 border border-slate-200 dark:border-slate-800 fade-in';
    div.style.animationDelay = `${i * 0.05}s`;
    const date = new Date(c.created_at);
    const dateStr = date.toLocaleDateString(currentLang, { year:'numeric', month:'short', day:'numeric' });
    div.innerHTML = `
      <div class="flex items-start justify-between mb-2">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-full bg-yellow-500/20 flex items-center justify-center text-yellow-500 font-bold">${(c.username || '?')[0]}</div>
          <div>
            <p class="font-bold">${c.username || (currentLang === 'ar' ? 'مجهول' : 'Anonymous')}</p>
            <p class="text-xs text-slate-400">${dateStr}</p>
          </div>
        </div>
      </div>
      <p class="text-slate-600 dark:text-slate-300 leading-relaxed">${c.comment}</p>
    `;
    list.appendChild(div);
  });
}
